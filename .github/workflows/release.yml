name: Release

# Builds the distributables, creates a GitHub release, and attaches each
# file with its checksum. Triggered by pushing a version tag:
#
#   npm version minor
#   git push --follow-tags

on:
  push:
    tags:
      - 'v*'

# No permissions by default.
permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create release and upload assets
      id-token: write      # request OIDC token for attestation signing
      attestations: write  # write attestation to repo
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Check out build tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          repository: keepass-web/build
          path: .build

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22.23.0'

      - name: Install dependencies
        run: npm ci

      - name: Lint and format (Biome)
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      # Guard: refuse to release if the tag and package.json disagree.
      - name: Verify tag matches package version
        run: |
          version=$(node -p "require('./package.json').version")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match package.json version '${version}'"
            exit 1
          fi

      # Build each distributable separately to capture individual checksums.
      # The inliner prints sha256:<hex> to stdout.
      - name: Build distributables
        id: build
        run: |
          checksum_0x67=$(node --experimental-strip-types .build/inliner/src/index.ts build.json)
          checksum_router=$(node --experimental-strip-types .build/inliner/src/index.ts build-router.json)
          echo "checksum_0x67=${checksum_0x67}" >> "$GITHUB_OUTPUT"
          echo "checksum_router=${checksum_router}" >> "$GITHUB_OUTPUT"
          printf '### Distributable checksums\n| File | SHA-256 |\n|------|---------|\n| `keepassweb-0x67.html` | `%s` |\n| `keepassweb.html` | `%s` |\n' \
            "${checksum_0x67}" "${checksum_router}" >> "$GITHUB_STEP_SUMMARY"

      - name: Attest distributables
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: |
            dist/keepassweb-0x67.html
            dist/keepassweb.html

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes="### Distributable checksums"$'\n'
          notes+="| File | SHA-256 |"$'\n'
          notes+="|------|---------|"$'\n'
          notes+="| \`keepassweb-0x67.html\` | \`${{ steps.build.outputs.checksum_0x67 }}\` |"$'\n'
          notes+="| \`keepassweb.html\` | \`${{ steps.build.outputs.checksum_router }}\` |"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "${notes}" \
            dist/keepassweb-0x67.html \
            dist/keepassweb.html

      - name: Generate deploy token
        id: deploy-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          app-id: ${{ secrets.DEPLOY_BOT_APP_ID }}
          private-key: ${{ secrets.DEPLOY_BOT_APP_PRIVATE_KEY }}
          repositories: keepass-web.github.io

      - name: Trigger deploy workflow
        env:
          GH_TOKEN: ${{ steps.deploy-token.outputs.token }}
        run: |
          gh workflow run deploy.yml \
            --repo keepass-web/keepass-web.github.io \
            --field release-tag="$GITHUB_REF_NAME"
